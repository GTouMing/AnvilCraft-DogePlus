name: Bug Report / 问题反馈
description: Report a bug to help us improve / 提交问题以帮助我们改进
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for taking the time to fill out this bug report!
        ## 感谢你花时间填写此问题反馈。

  - type: textarea
    id: description
    attributes:
      label: Bug Description / 问题描述
      description: A clear and concise description of what the bug is / 清晰简洁地描述问题是什么
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: How can we reproduce this bug? / 如何复现此问题？
      placeholder: |
        1. Place the block...
        2. Right-click with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: What did you expect to happen? / 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      description: What actually happened? / 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / 相关日志
      description: Please copy and paste any relevant log output (e.g., latest.log, crash report) / 请粘贴相关日志（如 latest.log、崩溃报告）
      render: shell

  - type: input
    id: version
    attributes:
      label: Mod Version / 模组版本
      description: Which version of the mod are you running? / 你运行的是哪个版本？
      placeholder: "e.g. 0.0.1"
    validations:
      required: true

  - type: dropdown
    id: env
    attributes:
      label: Environment / 环境
      description: Where does this occur? / 在什么环境下出现？
      options:
        - Singleplayer / 单人游戏
        - Multiplayer (Server) / 多人游戏（服务端）
        - Both / 两者都有
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context / 补充信息
      description: Add any other context, screenshots, or videos about the problem here / 添加其他上下文、截图或视频
